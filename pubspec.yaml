name: do_an_quan_ly_tai_chinh
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_localization: ^0.3.3
  http: ^1.6.0
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  uuid: ^4.5.3
  fl_chart: ^1.2.0
  get_it: ^9.2.1
  intl: ^0.20.2
  grouped_list: ^6.0.0
  flutter_bloc: ^9.1.1
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # 👉 ĐÃ THÊM: Thư viện tự động cắt Icon cho App
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # 👉 ĐÃ MỞ KHÓA: Khai báo thư mục assets để Flutter nhận diện hình ảnh
  assets:
    - assets/icon/

# =======================================================
# 👉 ĐÃ THÊM: Cấu hình tự động tạo Icon cho Android & iOS
# =======================================================
flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true